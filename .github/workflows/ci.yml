name: CI

on:
  push:
    branches: [main]

jobs:
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: front-react/package-lock.json
      - run: npm ci
      - run: npm run build

  check-api:
    name: API syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: find api -name "*.js" -not -path "*/node_modules/*" -exec node --check {} \;
