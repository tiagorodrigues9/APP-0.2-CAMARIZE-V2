services:
  api:
    build: ../api
    container_name: camarize-api
    restart: unless-stopped
    env_file: ../api/.env
    environment:
      - NODE_ENV=production
      - PORT=4000
    ports:
      - "4000:4000"

  frontend:
    build: ../front-react
    container_name: camarize-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SSE_URL=http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"
